[loggers]
keys=root,activity,alerts,errors

[handlers]
keys=consoleHandler,activityHandler,alertsHandler,errorsHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_activity]
level=INFO
handlers=activityHandler
qualname=activity
propagate=0

[logger_alerts]
level=WARNING
handlers=alertsHandler
qualname=alerts
propagate=0

[logger_errors]
level=ERROR
handlers=errorsHandler
qualname=errors
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_activityHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('logs/activity.log', 'a')

[handler_alertsHandler]
class=FileHandler
level=WARNING
formatter=simpleFormatter
args=('logs/alerts.log', 'a')

[handler_errorsHandler]
class=FileHandler
level=ERROR
formatter=simpleFormatter
args=('logs/errors.log', 'a')

[formatter_simpleFormatter]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
